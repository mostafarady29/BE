<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>الموظفون — مكتب النائب</title>
    <link rel="stylesheet" href="assets/css/main.css" />
</head>

<body>
    <div class="layout-dashboard">
        <aside class="sidebar">
            <div class="sidebar-brand">
                <div class="logo-icon">🏛️</div>
                <span>مكتب النائب</span>
            </div>
            <div class="sidebar-label">القائمة الرئيسية</div>
            <a href="dashboard.html" class="sidebar-link"><span class="icon">📊</span> لوحة التحكم</a>
            <a href="posts.html" class="sidebar-link"><span class="icon">📋</span> الطلبات</a>
            <a href="users.html" class="sidebar-link active"><span class="icon">👥</span> الموظفون</a>
            <div class="sidebar-footer">
                <div id="user-info" style="padding:.75rem;margin-bottom:.5rem"></div>
                <button class="btn btn-secondary btn-full btn-sm" onclick="auth.logout()">تسجيل الخروج</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1>إدارة الموظفين</h1>
                    <p>إضافة وتعديل حسابات الموظفين</p>
                </div>
                <button class="btn btn-primary" onclick="openModal()">+ إضافة موظف</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>اسم المستخدم</th>
                            <th>الدور</th>
                            <th>رقم الهاتف</th>
                            <th>الحالة</th>
                            <th>تاريخ الإنشاء</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="users-tbody">
                        <tr>
                            <td colspan="7" style="text-align:center;padding:3rem">
                                <div class="spinner"></div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="user-modal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="modal-title">إضافة موظف جديد</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div id="modal-alert"></div>
            <form onsubmit="saveUser(event)">
                <input type="hidden" id="edit-id" />
                <div class="form-group">
                    <label class="form-label">اسم المستخدم *</label>
                    <input id="u-username" class="form-control" placeholder="username" required />
                </div>
                <div class="form-group">
                    <label class="form-label">كلمة المرور *</label>
                    <input id="u-password" class="form-control" type="password" placeholder="8 أحرف على الأقل" />
                    <span class="form-hint" id="edit-pw-hint" style="display:none">اتركها فارغة إذا لا تريد
                        تغييرها</span>
                </div>
                <div class="form-group">
                    <label class="form-label">رقم الهاتف</label>
                    <input id="u-phone" class="form-control" placeholder="01XXXXXXXXX" />
                </div>
                <div class="form-group">
                    <label class="form-label">الدور *</label>
                    <select id="u-role" class="form-control" required>
                        <option value="moderator">موظف (Moderator)</option>
                        <option value="admin">مدير (Admin)</option>
                    </select>
                </div>
                <div style="display:flex;gap:.75rem;margin-top:.5rem">
                    <button type="button" class="btn btn-secondary" style="flex:1" onclick="closeModal()">إلغاء</button>
                    <button type="submit" class="btn btn-primary" style="flex:1" id="save-btn">حفظ</button>
                </div>
            </form>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/auth.js"></script>
    <script>
        auth.guard('admin');
        auth.renderUserInfo();

        async function loadUsers() {
            try {
                const res = await api.get('/users');
                document.getElementById('users-tbody').innerHTML = res.data.length
                    ? res.data.map(u => `
              <tr>
                <td class="primary">#${u.id}</td>
                <td class="primary">${u.username}</td>
                <td><span class="badge ${u.role === 'admin' ? 'badge-in-progress' : 'badge-resolved'}">${u.role === 'admin' ? 'مدير' : 'موظف'}</span></td>
                <td>${u.phone || '—'}</td>
                <td><span class="badge ${u.is_active ? 'badge-resolved' : 'badge-rejected'}">${u.is_active ? 'نشط' : 'موقوف'}</span></td>
                <td>${formatDate(u.created_at)}</td>
                <td>
                  <div style="display:flex;gap:.5rem">
                    <button class="btn btn-secondary btn-sm" onclick="openModal(${JSON.stringify(u).replace(/"/g, '&quot;')})">تعديل</button>
                    ${u.id !== JSON.parse(localStorage.getItem('mp_user') || '{}').id
                            ? `<button class="btn btn-danger btn-sm" onclick="deactivateUser(${u.id},'${u.username}',${u.is_active})">
                           ${u.is_active ? 'إيقاف' : 'تفعيل'}</button>`
                            : ''}
                  </div>
                </td>
              </tr>`).join('')
                    : '<tr><td colspan="7"><div class="empty-state"><div class="icon">👥</div><p>لا يوجد موظفون حتى الآن</p></div></td></tr>';
            } catch (e) { showToast(e.message, 'error'); }
        }

        function openModal(user) {
            document.getElementById('modal-alert').innerHTML = '';
            document.getElementById('edit-id').value = user?.id || '';
            document.getElementById('u-username').value = user?.username || '';
            document.getElementById('u-password').value = '';
            document.getElementById('u-phone').value = user?.phone || '';
            document.getElementById('u-role').value = user?.role || 'moderator';
            document.getElementById('modal-title').textContent = user ? `تعديل: ${user.username}` : 'إضافة موظف جديد';
            document.getElementById('edit-pw-hint').style.display = user ? 'block' : 'none';
            if (!user) document.getElementById('u-password').required = true;
            else document.getElementById('u-password').required = false;
            document.getElementById('user-modal').classList.add('open');
        }

        function closeModal() { document.getElementById('user-modal').classList.remove('open'); }

        async function saveUser(e) {
            e.preventDefault();
            const id = document.getElementById('edit-id').value;
            const username = document.getElementById('u-username').value.trim();
            const password = document.getElementById('u-password').value;
            const phone = document.getElementById('u-phone').value.trim();
            const role = document.getElementById('u-role').value;

            const payload = { username, phone, role };
            if (password) payload.password = password;

            const btn = document.getElementById('save-btn');
            btn.disabled = true; btn.textContent = 'جارٍ الحفظ...';

            try {
                if (id) await api.patch(`/users/${id}`, payload);
                else await api.post('/users', { ...payload, password: password });

                showToast(id ? 'تم التعديل ✓' : 'تم الإنشاء ✓', 'success');
                closeModal();
                loadUsers();
            } catch (e) {
                document.getElementById('modal-alert').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
            } finally {
                btn.disabled = false; btn.textContent = 'حفظ';
            }
        }

        async function deactivateUser(id, username, isActive) {
            const action = isActive ? 'إيقاف' : 'تفعيل';
            if (!confirm(`هل تريد ${action} حساب "${username}"؟`)) return;
            try {
                if (isActive) await api.delete(`/users/${id}`);
                else await api.patch(`/users/${id}`, { is_active: true });
                showToast(`تم ${action} الحساب ✓`, 'success');
                loadUsers();
            } catch (e) { showToast(e.message, 'error'); }
        }

        // Close modal on overlay click
        document.getElementById('user-modal').addEventListener('click', function (e) {
            if (e.target === this) closeModal();
        });

        loadUsers();
    </script>
</body>

</html>
