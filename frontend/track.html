<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>تتبع الطلب — منظومة طلبات المواطنين</title>
    <meta name="description" content="تابع حالة طلبك أو شكواك بسهولة">
    <link rel="stylesheet" href="assets/css/main.css" />
    <style>
        body {
            background: linear-gradient(160deg, #eef2ff 0%, #f0f4f8 60%);
        }

        .track-wrapper {
            max-width: 600px;
            margin: 3rem auto;
            padding: 0 1rem;
        }

        .track-hero {
            text-align: center;
            margin-bottom: 2rem;
        }

        .result-card {
            display: none;
        }

        .status-timeline {
            margin-top: 1.5rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            font-size: .875rem;
        }

        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-secondary);
        }

        .detail-value {
            color: var(--text-primary);
            font-weight: 500;
            text-align: left;
            max-width: 60%;
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="container navbar-inner">
            <div class="navbar-brand">
                <div class="logo-icon">🏛️</div>
                <span>مكتب النائب</span>
            </div>
            <nav class="navbar-nav">
                <a href="index.html" class="nav-link">تقديم طلب</a>
                <a href="track.html" class="nav-link active">تتبع الطلب</a>
                <a href="login.html" class="nav-link">دخول الموظفين</a>
            </nav>
        </div>
    </nav>

    <div class="container">
        <div class="track-wrapper">
            <div class="track-hero">
                <div style="font-size:3rem;margin-bottom:.75rem">🔍</div>
                <h1>تتبع طلبك</h1>
                <p>أدخل رقم القومي ورقم الطلب لمعرفة حالته الحالية</p>
            </div>

            <!-- Search Form -->
            <div class="card" style="margin-bottom:1.5rem">
                <div class="form-group">
                    <label class="form-label">الرقم القومي</label>
                    <input id="track-nid" class="form-control" placeholder="الرقم القومي (14 رقم)" maxlength="14" />
                </div>
                <div class="form-group">
                    <label class="form-label">رقم الطلب</label>
                    <input id="track-pid" class="form-control" type="number" placeholder="رقم الطلب" />
                </div>
                <div id="track-alert"></div>
                <button class="btn btn-primary btn-full" onclick="trackRequest()">تتبع &rarr;</button>
            </div>

            <!-- Result -->
            <div class="card result-card" id="result-card">
                <div class="card-header">
                    <h3 id="res-post-id">طلب رقم #—</h3>
                    <span id="res-status-badge"></span>
                </div>
                <div class="detail-row"><span class="detail-label">نوع المشكلة</span><span class="detail-value"
                        id="res-type">—</span></div>
                <div class="detail-row"><span class="detail-label">المدينة</span><span class="detail-value"
                        id="res-city">—</span></div>
                <div class="detail-row"><span class="detail-label">تاريخ التقديم</span><span class="detail-value"
                        id="res-date">—</span></div>
                <div class="detail-row"><span class="detail-label">المسؤول</span><span class="detail-value"
                        id="res-assigned">لم يُحدد بعد</span></div>

                <hr class="divider" />
                <h4 style="margin-bottom:.75rem">وصف الطلب</h4>
                <p id="res-desc" style="font-size:.875rem;color:var(--text-secondary);line-height:1.7"></p>

                <hr class="divider" />
                <div style="text-align:center;padding:.5rem 0">
                    <a href="index.html" class="btn btn-secondary btn-sm">تقديم طلب جديد</a>
                </div>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script>
        async function trackRequest() {
            const nid = document.getElementById('track-nid').value.trim();
            const pid = document.getElementById('track-pid').value.trim();

            if (!nid || !pid) {
                document.getElementById('track-alert').innerHTML = '<div class="alert alert-error">يرجى إدخال الرقم القومي ورقم الطلب</div>';
                return;
            }

            try {
                const btn = document.querySelector('.btn-primary');
                btn.disabled = true; btn.textContent = 'جارٍ البحث...';

                // Lookup citizen to validate national_id
                const citizenRes = await api.post('/citizens/lookup', { national_id: nid });
                if (!citizenRes.found) throw new Error('الرقم القومي غير موجود في النظام');

                // Fetch post details — using a public check via status
                const postRes = await fetch(`/api/posts/${pid}`).then(r => r.json()).catch(() => null);

                // If not accessible without token, show placeholder
                const post = postRes?.data;
                if (!post || !postRes?.success) throw new Error('رقم الطلب غير صحيح أو لا يخص هذا الرقم القومي');
                if (post.national_id !== nid) throw new Error('رقم الطلب لا يطابق الرقم القومي المدخل');

                renderResult(post);
                document.getElementById('track-alert').innerHTML = '';
            } catch (e) {
                document.getElementById('track-alert').innerHTML = `<div class="alert alert-error">${e.message}</div>`;
                document.getElementById('result-card').style.display = 'none';
            } finally {
                const btn = document.querySelector('.btn-primary');
                btn.disabled = false; btn.textContent = 'تتبع ←';
            }
        }

        function renderResult(post) {
            document.getElementById('res-post-id').textContent = `طلب رقم #${post.id}`;
            document.getElementById('res-status-badge').innerHTML = statusBadge(post.status_name);
            document.getElementById('res-type').textContent = post.problem_type;
            document.getElementById('res-city').textContent = post.city;
            document.getElementById('res-date').textContent = formatDate(post.created_at);
            document.getElementById('res-assigned').textContent = post.assigned_username || 'لم يُحدد بعد';
            document.getElementById('res-desc').textContent = post.problem_description;
            document.getElementById('result-card').style.display = 'block';
        }
    </script>
</body>

</html>
